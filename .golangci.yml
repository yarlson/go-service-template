version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - govet
    - ineffassign
    - misspell
    - noctx
    - nolintlint
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - unconvert
    - unused
    - wastedassign
  exclusions:
    generated: strict
    warn-unused: true

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: strict
    warn-unused: true
