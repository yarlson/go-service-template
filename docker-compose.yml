services:
  postgres:
    image: postgres:18.4-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: serviceuser
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: service_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceuser -d service_db"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
