version: "2"
sql:
  - engine: postgresql
    schema: db/migrations
    queries: internal/users/postgres/queries.sql
    gen:
      go:
        package: postgres
        out: internal/users/postgres
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
