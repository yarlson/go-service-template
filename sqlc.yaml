version: "2"
sql:
  - engine: postgresql
    schema:
      - db/migrations/000001_create_users.up.sql
      - db/migrations/000008_create_user_imports.up.sql
      - db/migrations/000009_add_user_import_correlation.up.sql
    queries: internal/users/postgres/queries.sql
    gen:
      go:
        package: postgres
        out: internal/users/postgres
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
